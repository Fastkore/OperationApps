{% extends "base.html" %}
{% block content %}
<h2>Operations</h2>
<form method="get" class="mb-3">
  <div class="input-group">
    <input type="text" name="status" class="form-control" placeholder="Status" value="{{ status_filter }}">
    <button class="btn btn-outline-secondary" type="submit">Filter</button>
  </div>
</form>
<table class="table table-striped">
  <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Status</th>
      <th>Owner</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
  {% for op in operations %}
    <tr>
      <td>{{ op.id }}</td>
      <td>{{ op.name }}</td>
      <td>{{ op.status }}</td>
      <td>{{ op.owner }}</td>
      <td><a class="btn btn-sm btn-primary" href="{{ op.id }}/">Details</a></td>
    </tr>
  {% empty %}
    <tr><td colspan="5">No operations</td></tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
